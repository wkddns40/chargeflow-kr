name: Vercel Production Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  frontend:
    name: frontend production
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
    steps:
      - name: Check Vercel secrets
        id: deploy_secrets
        shell: bash
        run: |
          if [[ -n "$VERCEL_TOKEN" && -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping frontend production deploy because Vercel deployment secrets are not configured."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.deploy_secrets.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.deploy_secrets.outputs.ready == 'true'
        with:
          node-version: 22

      - name: Pull Vercel production environment
        if: steps.deploy_secrets.outputs.ready == 'true'
        working-directory: frontend
        run: npx --yes vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        if: steps.deploy_secrets.outputs.ready == 'true'
        working-directory: frontend
        run: npx --yes vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy frontend production
        if: steps.deploy_secrets.outputs.ready == 'true'
        working-directory: frontend
        run: npx --yes vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  backend:
    name: backend production
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
    steps:
      - name: Check Vercel secrets
        id: deploy_secrets
        shell: bash
        run: |
          if [[ -n "$VERCEL_TOKEN" && -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping backend production deploy because Vercel deployment secrets are not configured."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.deploy_secrets.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.deploy_secrets.outputs.ready == 'true'
        with:
          node-version: 22

      - name: Pull Vercel production environment
        if: steps.deploy_secrets.outputs.ready == 'true'
        working-directory: backend
        run: npx --yes vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        if: steps.deploy_secrets.outputs.ready == 'true'
        working-directory: backend
        run: npx --yes vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy backend production
        if: steps.deploy_secrets.outputs.ready == 'true'
        working-directory: backend
        run: npx --yes vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
